<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>TTS 목소리 테스트</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; max-width: 600px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
    h2 { color: #8B4FE8; }
    select, textarea { width: 100%; padding: 10px; font-size: 1rem; margin: 8px 0 16px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; }
    button { background: #8B4FE8; color: white; border: none; padding: 12px 28px; border-radius: 24px; font-size: 1rem; cursor: pointer; margin-right: 8px; }
    button:hover { background: #6D28D9; }
    button.stop { background: #EF4444; }
    #status { margin-top: 16px; color: #666; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h2>🔊 TTS 목소리 테스트</h2>

  <label>목소리 선택</label>
  <select id="voiceSelect"></select>

  <label>읽을 문장</label>
  <textarea id="text" rows="4">어느 날 교실에 이상한 문이 나타났다. 아무도 그 문이 어디서 왔는지 몰랐지만, 문 너머에서는 희미한 빛이 새어 나오고 있었다.</textarea>

  <div>
    <button onclick="speak()">▶ 재생</button>
    <button class="stop" onclick="stop()">■ 정지</button>
  </div>

  <div id="status">목소리 목록을 불러오는 중...</div>

  <script>
    const synth = window.speechSynthesis;
    let voices = [];

    function loadVoices() {
      voices = synth.getVoices().filter(v => v.lang.startsWith('ko'));
      const select = document.getElementById('voiceSelect');
      select.innerHTML = '';

      if (voices.length === 0) {
        document.getElementById('status').textContent = '⚠️ 한국어 목소리가 없어요. Chrome 브라우저로 열어주세요.';
        return;
      }

      voices.forEach((v, i) => {
        const opt = document.createElement('option');
        opt.value = i;
        opt.textContent = `${v.name} (${v.lang})`;
        select.appendChild(opt);
      });
      document.getElementById('status').textContent = `한국어 목소리 ${voices.length}개 발견`;
    }

    synth.onvoiceschanged = loadVoices;
    loadVoices();

    function speak() {
      synth.cancel();
      const text = document.getElementById('text').value;
      const idx = document.getElementById('voiceSelect').value;
      const utter = new SpeechSynthesisUtterance(text);
      utter.voice = voices[idx];
      utter.lang = 'ko-KR';
      utter.rate = 0.9;
      utter.pitch = 1;
      utter.onstart = () => document.getElementById('status').textContent = '🔊 재생 중...';
      utter.onend = () => document.getElementById('status').textContent = '✅ 재생 완료';
      synth.speak(utter);
    }

    function stop() {
      synth.cancel();
      document.getElementById('status').textContent = '■ 정지됨';
    }
  </script>
</body>
</html>
